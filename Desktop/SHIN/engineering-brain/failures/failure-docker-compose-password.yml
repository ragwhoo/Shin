id: failure-docker-compose-password
title: Hardcoded Secrets in Docker Compose
concept: concept-docker
impact: Database passwords and API keys were hardcoded in docker-compose.yml and accidentally committed to the repository, exposing credentials.
lesson: Use environment files (.env) with .gitignore for secrets. Consider Docker secrets or external secret management for production.
confidence: 0.96
