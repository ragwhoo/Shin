id: failure-jsx-nesting-extra-divs
title: Extra </div> tags consumed as JavaScript causing "Unterminated regexp literal"
concept: concept-react
problem: After refactoring the install terminal section, the build failed with "Unterminated regexp literal" at a </div> closing tag. The actual bug was far from the error location.
root_cause: During edits, the ))} closing a .map() call and JSX expression was accidentally removed. The extra </div> tags that should have been inside JSX were instead parsed as JavaScript expressions, where /< starts a regex literal (div> treated as regex content).
solution: Trace the tag hierarchy from the error location backward. Count opening vs closing tags. Verify that JSX expressions ({...}) are properly closed with ))} before any closing HTML tags. Use clean indentation to visually verify nesting.
outcome: Success
confidence: 0.95
usage_count: 1
tags:
