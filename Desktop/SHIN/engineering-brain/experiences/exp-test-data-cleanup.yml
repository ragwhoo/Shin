id: exp-test-data-cleanup
title: Test Data Cleanup Issues
concept: concept-testing
problem: Test suite became slower over time and tests started failing due to stale data from previous test runs
root_cause: Test data was inserted into the database but never cleaned up after test execution
solution: Implemented test database transactions that roll back after each test and added @AfterEach cleanup methods
outcome: Success
