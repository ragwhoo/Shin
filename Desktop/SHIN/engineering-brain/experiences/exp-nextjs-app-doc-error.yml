id: exp-nextjs-app-doc-error
title: Next.js App Router Build Fails with _document Error
concept: concept-frontend-build
problem: "Next.js 14.2 App Router project fails to build with 'Cannot find module for page: /_document' when using layout.js in the app directory"
root_cause: Next.js 14.2.x internal build-analysis checks still reference Pages Router's _document during static generation, causing a false failure in App Router-only projects
solution: Upgrade Next.js to v15+ (or v16.2.x). The internal analysis was fixed to skip Pages Router checks for App Router projects.
outcome: Success
confidence: 0.85
usage_count: 1
tags:
  - nextjs
  - app-router
  - build
  - _document
  - error
