id: exp-state-reset-on-nav
title: State Reset on Navigation
concept: concept-state-management
problem: Form data and UI state were lost when navigating between pages and then returning via browser back button
root_cause: State was stored only in component-local state which unmounts on navigation without any persistence layer
solution: Migrated critical form state to URL search params and used sessionStorage for persistent UI state across navigation
outcome: Success
confidence: 0.86
usage_count: 4
tags:
  - state-management
  - react
  - navigation
